name: Docker Build and Push

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]      # Optional: trigger on tag pushes

env:
  DOCKER_IMAGE_NAME: docker.io/${{ vars.DOCKER_HUB_USERNAME }}/clamav-rest-sigmon
  DOCKER_HUB_USERNAME: ${{ vars.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

permissions:
  contents: write
  packages: write
jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      new_version: ${{ steps.tag_version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Calculate SemVer tag
        id: tag_version
        uses: nickkostov/github-tag-action@v1.3.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          dry_run: false
          fetch_all_tags: true
          tag_prefix: v
 
  build-and-push:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4.3.0
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ needs.version.outputs.new_version }}
          build-args: |
            VERSION=${{ needs.version.outputs.new_version }}
            TARGETOS=linux
            TARGETARCH=${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
